<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Letadla</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #333;
    }

    header {
      background: #1f3c88;
      color: white;
      padding: 30px;
      text-align: center;
    }

    nav {
      padding: 15px;
      background: white;
      text-align: center;
    }

    nav a {
      text-decoration: none;
      color: #1f3c88;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    <h1>✈️ Letadla</h1>
    <p>Galerie a zajímavosti o letadlech</p>
  </header>

  <nav>
    <a href="index.html">← Zpět na hlavní stránku</a>
  </nav>

  <div class="container">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1529070538774-1843cb3265df">
      <div class="card-content">
        <h3>Boeing 747</h3>
        <p>Jedno z nejznámějších dopravních letadel na světě.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1504196606672-aef5c9cefc92">
      <div class="card-content">
        <h3>Airbus A380</h3>
        <p>Největší osobní letadlo, které kdy létalo.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e">
      <div class="card-content">
        <h3>Stíhačka</h3>
        <p>Rychlá vojenská letadla používaná v obraně.</p>
      </div>
    </div>

  </div>

  <footer>
    © 2026 Eva Zizková
  </footer>

</body>
</html>
